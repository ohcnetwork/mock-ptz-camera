<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock PTZ Camera</title>
<link rel="stylesheet" href="/static/common.css">
<style>
  .ws-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .ws-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--destructive);
    transition: background 0.2s;
  }
  .ws-dot.connected { background: var(--primary); box-shadow: 0 0 8px rgba(85,176,96,0.4); }
  .main-content {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .video-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
    min-width: 0;
  }
  .video-panel canvas {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .status-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 10px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    font-size: 12px;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    letter-spacing: 0.02em;
    color: var(--text-muted);
  }
  .status-bar span span { color: var(--text); }
  .status-bar .moving { color: #f59e0b; font-weight: 600; }
  .status-bar .idle { color: var(--primary); font-weight: 500; }

  .controls-panel {
    width: 360px;
    min-width: 360px;
    overflow-y: auto;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .controls-panel::-webkit-scrollbar { width: 6px; }
  .controls-panel::-webkit-scrollbar-track { background: transparent; }
  .controls-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* D-Pad */
  .dpad-container {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .dpad {
    display: grid;
    grid-template-columns: 44px 44px 44px;
    grid-template-rows: 44px 44px 44px;
    gap: 4px;
  }
  .dpad button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad button:hover { background: var(--primary-muted); color: var(--primary); border-color: var(--primary); }
  .dpad button:active { background: var(--primary); color: var(--primary-fg); }
  .dpad button.active-dir { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
  .dpad .center {
    background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 14px;
    /* color: var(--destructive); */
  }
  .dpad .center:hover { background: rgba(239,68,68,0.1); border-color: var(--destructive); color: var(--destructive); }

  .zoom-buttons {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .zoom-buttons button {
    width: 52px;
    height: 44px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius);
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    user-select: none;
    -webkit-user-select: none;
    transition: all 0.15s ease;
  }
  .zoom-buttons button:hover { background: var(--primary-muted); color: var(--primary); border-color: var(--primary); }
  .zoom-buttons button:active { background: var(--primary); color: var(--primary-fg); }
  .zoom-buttons button.active-dir { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }

  /* Speed */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .speed-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }
  .speed-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
    cursor: pointer;
    box-shadow: 0 0 0 3px var(--primary-muted);
  }
  .speed-val {
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 13px;
    min-width: 40px;
    text-align: right;
    color: var(--text-muted);
    background: var(--bg);
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  /* Mode toggle */
  .mode-row {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    background: var(--bg);
    padding: 4px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .mode-row button {
    flex: 1;
    padding: 7px 12px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  .mode-row button:hover { color: var(--text); }
  .mode-row button.active {
    background: var(--primary);
    color: var(--primary-fg);
    box-shadow: 0 1px 3px rgba(85,176,96,0.3);
  }

  /* Absolute Move */
  .abs-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .abs-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .abs-row label {
    width: 40px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .abs-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }
  .abs-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
    cursor: pointer;
    box-shadow: 0 0 0 3px var(--primary-muted);
  }
  .abs-row .abs-val {
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 12px;
    min-width: 48px;
    text-align: right;
    color: var(--text-muted);
    background: var(--bg);
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .abs-go {
    padding: 9px 20px;
    background: var(--primary);
    border: none;
    color: var(--primary-fg);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    align-self: flex-end;
    transition: background 0.15s ease;
  }
  .abs-go:hover { background: var(--primary-hover); }
  .abs-go:active { transform: scale(0.98); }

  /* Presets */
  .preset-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 10px;
  }
  .preset-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    transition: border-color 0.15s;
  }
  .preset-item:hover { border-color: var(--text-dim); }
  .preset-item .name { flex: 1; font-weight: 500; }
  .preset-item .pos {
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .preset-item button {
    padding: 4px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  .preset-item .goto-btn {
    background: var(--primary-muted);
    color: var(--primary);
  }
  .preset-item .goto-btn:hover { background: var(--primary); color: var(--primary-fg); }
  .preset-item .del-btn {
    background: rgba(239,68,68,0.1);
    color: var(--destructive);
  }
  .preset-item .del-btn:hover { background: var(--destructive); color: #fff; }
  .preset-add {
    display: flex;
    gap: 8px;
  }
  .preset-add input {
    flex: 1;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .preset-add input::placeholder { color: var(--text-dim); }
  .preset-add input:focus { border-color: var(--ring); box-shadow: 0 0 0 3px var(--primary-muted); }
  .preset-add button {
    padding: 8px 16px;
    background: var(--primary);
    border: none;
    color: var(--primary-fg);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s ease;
  }
  .preset-add button:hover { background: var(--primary-hover); }
  .empty-presets {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    padding: 16px;
  }

  /* Home button */
  .home-btn {
    width: 100%;
    padding: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  .home-btn:hover { background: var(--primary-muted); border-color: var(--primary); color: var(--primary); }
  .home-btn:active { background: var(--primary); color: var(--primary-fg); }

  @media (max-width: 768px) {
    .main-content { flex-direction: column; }
    .video-panel {
      max-height: 40vh;
      min-height: 200px;
    }
    .controls-panel {
      width: 100%;
      min-width: unset;
      border-left: none;
      border-top: 1px solid var(--border);
      max-height: unset;
      flex: 1;
      padding: 12px;
    }
    .status-bar {
      gap: 12px;
      font-size: 11px;
      padding: 8px 12px;
    }
    .dpad-container {
      justify-content: center;
    }
    .dpad {
      grid-template-columns: 40px 40px 40px;
      grid-template-rows: 40px 40px 40px;
    }
    .zoom-buttons button {
      width: 46px;
      height: 40px;
      font-size: 12px;
    }
    .ws-status {
      font-size: 12px;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <h1>Mock PTZ Camera</h1>
      <nav>
        <a href="/" class="active">Camera</a>
        <a href="/test">ONVIF API Test</a>
      </nav>
    </div>
    <div class="ws-status">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">Disconnected</span>
    </div>
  </header>
  <div class="main-content">
    <div class="video-panel">
      <canvas id="videoCanvas"></canvas>
      <div class="status-bar">
        <span>Pan: <span id="sPan">0.000</span></span>
        <span>Tilt: <span id="sTilt">0.000</span></span>
        <span>Zoom: <span id="sZoom">0.000</span></span>
        <span id="sMoving" class="idle">IDLE</span>
      </div>
    </div>
    <div class="controls-panel">
      <!-- Direction Controls -->
      <div class="section">
        <h3>Direction Controls</h3>
        <div class="mode-row">
          <button id="modeRelative" class="active" onclick="setMode('relative')">Relative</button>
          <button id="modeContinuous" onclick="setMode('continuous')">Continuous</button>
        </div>
        <div class="dpad-container">
          <div class="dpad">
            <button data-pan="-1" data-tilt="1"  title="Up-Left">&#8598;</button>
            <button data-pan="0"  data-tilt="1"  title="Up">&#8593;</button>
            <button data-pan="1"  data-tilt="1"  title="Up-Right">&#8599;</button>
            <button data-pan="-1" data-tilt="0"  title="Left">&#8592;</button>
            <button class="center" title="Stop" onclick="sendStop()">&#9632;</button>
            <button data-pan="1"  data-tilt="0"  title="Right">&#8594;</button>
            <button data-pan="-1" data-tilt="-1" title="Down-Left">&#8601;</button>
            <button data-pan="0"  data-tilt="-1" title="Down">&#8595;</button>
            <button data-pan="1"  data-tilt="-1" title="Down-Right">&#8600;</button>
          </div>
          <div class="zoom-buttons">
            <button data-zoom="1" title="Zoom In">Z+</button>
            <button title="Reset Zoom" onclick="resetZoom()" style="font-size:11px">RST</button>
            <button data-zoom="-1" title="Zoom Out">Z&minus;</button>
          </div>
        </div>
      </div>

      <!-- Speed -->
      <div class="section">
        <h3>Speed</h3>
        <div class="speed-row">
          <span style="font-size:12px;color:var(--text-muted)">Slow</span>
          <input type="range" id="speedSlider" min="0.01" max="1" step="0.01" value="0.10">
          <span style="font-size:12px;color:var(--text-muted)">Fast</span>
          <span class="speed-val" id="speedVal">0.10</span>
        </div>
      </div>

      <!-- Absolute Move -->
      <div class="section">
        <h3>Absolute Move</h3>
        <div class="abs-group">
          <div class="abs-row">
            <label>Pan</label>
            <input type="range" id="absPan" min="-1" max="1" step="0.01" value="0">
            <span class="abs-val" id="absPanVal">0.00</span>
          </div>
          <div class="abs-row">
            <label>Tilt</label>
            <input type="range" id="absTilt" min="-0.33" max="1" step="0.01" value="0">
            <span class="abs-val" id="absTiltVal">0.00</span>
          </div>
          <div class="abs-row">
            <label>Zoom</label>
            <input type="range" id="absZoom" min="0" max="1" step="0.01" value="0">
            <span class="abs-val" id="absZoomVal">0.00</span>
          </div>
          <button class="abs-go" onclick="sendAbsolute()">Go</button>
        </div>
      </div>

      <!-- Home -->
      <button class="home-btn" onclick="sendAbsoluteValues(0,0,0)">&#8962; Home (0, 0, 0)</button>

      <!-- Presets -->
      <div class="section">
        <h3>Presets</h3>
        <div id="presetList" class="preset-list">
          <div class="empty-presets">No presets saved</div>
        </div>
        <div class="preset-add">
          <input type="text" id="presetName" placeholder="Preset name..." maxlength="64">
          <button onclick="savePreset()">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/common.js"></script>
<script>
  let ws = null;
  let mode = 'relative'; // 'relative' or 'continuous'
  let activeButtons = new Set();
  let holdIntervals = new Map();

  const speedSlider = document.getElementById('speedSlider');
  const speedVal = document.getElementById('speedVal');
  speedSlider.addEventListener('input', () => {
    speedVal.textContent = parseFloat(speedSlider.value).toFixed(2);
  });

  // Absolute sliders
  ['Pan','Tilt','Zoom'].forEach(axis => {
    const slider = document.getElementById('abs' + axis);
    const val = document.getElementById('abs' + axis + 'Val');
    slider.addEventListener('input', () => {
      val.textContent = parseFloat(slider.value).toFixed(2);
    });
  });

  // Mode toggle
  function setMode(m) {
    mode = m;
    document.getElementById('modeRelative').classList.toggle('active', m === 'relative');
    document.getElementById('modeContinuous').classList.toggle('active', m === 'continuous');
  }

  // D-pad buttons
  document.querySelectorAll('.dpad button[data-pan], .dpad button[data-tilt]').forEach(btn => {
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); handleDpadDown(btn); });
    btn.addEventListener('mouseup', (e) => { e.preventDefault(); handleDpadUp(btn); });
    btn.addEventListener('mouseleave', (e) => { handleDpadUp(btn); });
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleDpadDown(btn); });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); handleDpadUp(btn); });
    btn.addEventListener('touchcancel', (e) => { handleDpadUp(btn); });
  });

  // Zoom buttons
  document.querySelectorAll('.zoom-buttons button[data-zoom]').forEach(btn => {
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); handleZoomDown(btn); });
    btn.addEventListener('mouseup', (e) => { e.preventDefault(); handleZoomUp(btn); });
    btn.addEventListener('mouseleave', (e) => { handleZoomUp(btn); });
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleZoomDown(btn); });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); handleZoomUp(btn); });
    btn.addEventListener('touchcancel', (e) => { handleZoomUp(btn); });
  });

  function handleDpadDown(btn) {
    if (btn.classList.contains('center')) return;
    const pan = parseFloat(btn.dataset.pan) || 0;
    const tilt = parseFloat(btn.dataset.tilt) || 0;

    if (mode === 'relative') {
      const fire = () => {
        const speed = parseFloat(speedSlider.value);
        sendRelative(pan * speed, tilt * speed, 0);
      };
      fire();
      holdIntervals.set(btn, setInterval(fire, 150));
    } else {
      clearActiveDir();
      btn.classList.add('active-dir');
      activeButtons.add(btn);
      const speed = parseFloat(speedSlider.value);
      sendContinuous(pan * speed, tilt * speed, 0);
    }
  }

  function handleDpadUp(btn) {
    if (holdIntervals.has(btn)) {
      clearInterval(holdIntervals.get(btn));
      holdIntervals.delete(btn);
    }
    activeButtons.delete(btn);
  }

  function handleZoomDown(btn) {
    const zoom = parseFloat(btn.dataset.zoom) || 0;

    if (mode === 'relative') {
      const fire = () => {
        const speed = parseFloat(speedSlider.value);
        sendRelative(0, 0, zoom * speed);
      };
      fire();
      holdIntervals.set(btn, setInterval(fire, 150));
    } else {
      clearActiveDir();
      btn.classList.add('active-dir');
      activeButtons.add(btn);
      const speed = parseFloat(speedSlider.value);
      sendContinuous(0, 0, zoom * speed);
    }
  }

  function handleZoomUp(btn) {
    if (holdIntervals.has(btn)) {
      clearInterval(holdIntervals.get(btn));
      holdIntervals.delete(btn);
    }
    activeButtons.delete(btn);
  }

  // WebSocket
  let connectTimer = null;

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/ws`;
    try {
      ws = new WebSocket(url);
    } catch (e) {
      console.warn('[ws] connect failed:', e);
      scheduleReconnect();
      return;
    }

    // If the browser is stuck on a stale TCP connection (e.g. after server restart),
    // the WS handshake hangs for ~30s until TCP retransmit timeout. Abort early and retry.
    connectTimer = setTimeout(() => {
      if (ws && ws.readyState !== WebSocket.OPEN) {
        console.warn('[ws] connect timeout, retrying...');
        ws.onclose = null; // prevent scheduleReconnect from firing twice
        ws.close();
        scheduleReconnect();
      }
    }, 5000);

    ws.onopen = () => {
      clearTimeout(connectTimer);
      document.getElementById('wsDot').classList.add('connected');
      document.getElementById('wsLabel').textContent = 'Connected';
      send({ type: 'get_status' });
      send({ type: 'get_presets' });
    };

    ws.onclose = () => {
      clearTimeout(connectTimer);
      document.getElementById('wsDot').classList.remove('connected');
      document.getElementById('wsLabel').textContent = 'Disconnected';
      scheduleReconnect();
    };

    ws.onerror = () => { ws.close(); };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    };
  }

  function scheduleReconnect() {
    setTimeout(connectWS, 2000);
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  function sendAbsolute() {
    send({
      type: 'absolute_move',
      pan: parseFloat(document.getElementById('absPan').value),
      tilt: parseFloat(document.getElementById('absTilt').value),
      zoom: parseFloat(document.getElementById('absZoom').value)
    });
  }

  function sendAbsoluteValues(p, t, z) {
    send({ type: 'absolute_move', pan: p, tilt: t, zoom: z });
  }

  function sendRelative(p, t, z) {
    send({ type: 'relative_move', pan: p, tilt: t, zoom: z });
  }

  function sendContinuous(ps, ts, zs) {
    send({ type: 'continuous_move', pan_speed: ps, tilt_speed: ts, zoom_speed: zs });
  }

  function sendStop() {
    send({ type: 'stop' });
    activeButtons.clear();
    clearActiveDir();
  }

  function resetZoom() {
    sendStop();
    const p = parseFloat(document.getElementById('sPan').textContent);
    const t = parseFloat(document.getElementById('sTilt').textContent);
    sendAbsoluteValues(p, t, 0);
  }

  function clearActiveDir() {
    document.querySelectorAll('.active-dir').forEach(el => el.classList.remove('active-dir'));
  }

  function savePreset() {
    const input = document.getElementById('presetName');
    const name = input.value.trim() || 'Untitled';
    send({ type: 'set_preset', name: name });
    input.value = '';
    setTimeout(() => send({ type: 'get_presets' }), 300);
  }

  function gotoPreset(token) {
    send({ type: 'goto_preset', token: token });
  }

  function removePreset(token) {
    send({ type: 'remove_preset', token: token });
  }

  // Handle incoming messages
  function handleMessage(msg) {
    switch (msg.type) {
      case 'status':
        document.getElementById('sPan').textContent = msg.position.pan.toFixed(3);
        document.getElementById('sTilt').textContent = msg.position.tilt.toFixed(3);
        document.getElementById('sZoom').textContent = msg.position.zoom.toFixed(3);
        const movEl = document.getElementById('sMoving');
        if (msg.moving) {
          movEl.textContent = 'MOVING';
          movEl.className = 'moving';
        } else {
          movEl.textContent = 'IDLE';
          movEl.className = 'idle';
        }
        break;
      case 'presets':
        renderPresets(msg.presets || []);
        break;
      case 'preset_set':
        setTimeout(() => send({ type: 'get_presets' }), 100);
        break;
      case 'error':
        console.warn('[ws] error:', msg.message);
        break;
    }
  }

  function renderPresets(presets) {
    const list = document.getElementById('presetList');
    if (presets.length === 0) {
      list.innerHTML = '<div class="empty-presets">No presets saved</div>';
      return;
    }
    list.innerHTML = presets.map(p => `
      <div class="preset-item">
        <span class="name">${escapeHtml(p.name)}</span>
        <span class="pos">P${p.position.pan.toFixed(2)} T${p.position.tilt.toFixed(2)} Z${p.position.zoom.toFixed(2)}</span>
        <button class="goto-btn" onclick="gotoPreset('${escapeAttr(p.token)}')">Goto</button>
        <button class="del-btn" onclick="removePreset('${escapeAttr(p.token)}')">Del</button>
      </div>
    `).join('');
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    const speed = parseFloat(speedSlider.value);
    switch (e.key) {
      case 'ArrowUp':    e.preventDefault(); sendRelative(0, speed, 0); break;
      case 'ArrowDown':  e.preventDefault(); sendRelative(0, -speed, 0); break;
      case 'ArrowLeft':  e.preventDefault(); sendRelative(-speed, 0, 0); break;
      case 'ArrowRight': e.preventDefault(); sendRelative(speed, 0, 0); break;
      case '+': case '=': sendRelative(0, 0, speed); break;
      case '-': case '_': sendRelative(0, 0, -speed); break;
      case 'h': case 'H': sendAbsoluteValues(0, 0, 0); break;
      case ' ': e.preventDefault(); sendStop(); break;
    }
  });

  // ---- H.264 Video via WebCodecs ----
  let videoWS = null;
  let videoDecoder = null;
  let videoCanvas = document.getElementById('videoCanvas');
  let videoCtx = videoCanvas.getContext('2d');

  function connectVideoWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/ws/video`;
    try {
      videoWS = new WebSocket(url);
      videoWS.binaryType = 'arraybuffer';
    } catch (e) {
      console.warn('[video-ws] connect failed:', e);
      setTimeout(connectVideoWS, 2000);
      return;
    }

    videoWS.onopen = () => {
      console.log('[video-ws] connected');
    };

    videoWS.onclose = () => {
      console.log('[video-ws] disconnected');
      if (videoDecoder) {
        try { videoDecoder.close(); } catch (_) {}
        videoDecoder = null;
      }
      setTimeout(connectVideoWS, 2000);
    };

    videoWS.onerror = () => { videoWS.close(); };

    videoWS.onmessage = (e) => {
      if (typeof e.data === 'string') {
        // JSON init message
        const init = JSON.parse(e.data);
        if (init.type === 'init') {
          initDecoder(init.codec, init.width, init.height);
        }
        return;
      }
      // Binary: [1-byte key flag][Annex B data]
      const buf = new Uint8Array(e.data);
      if (buf.length < 2) return;
      const isKey = buf[0] === 1;
      const annexB = buf.slice(1);
      if (videoDecoder && videoDecoder.state === 'configured') {
        videoDecoder.decode(new EncodedVideoChunk({
          type: isKey ? 'key' : 'delta',
          timestamp: performance.now() * 1000, // microseconds
          data: annexB
        }));
      }
    };
  }

  function initDecoder(codec, width, height) {
    videoCanvas.width = width;
    videoCanvas.height = height;

    if (videoDecoder) {
      try { videoDecoder.close(); } catch (_) {}
    }

    videoDecoder = new VideoDecoder({
      output: (frame) => {
        videoCtx.drawImage(frame, 0, 0);
        frame.close();
      },
      error: (err) => {
        console.error('[video-decoder] error:', err);
      }
    });

    videoDecoder.configure({
      codec: codec,
      optimizeForLatency: true
    });
    console.log('[video-decoder] configured', codec, width, height);
  }

  // Init
  connectWS();
  connectVideoWS();
</script>
</body>
</html>
